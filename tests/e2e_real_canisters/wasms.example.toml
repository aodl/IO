# Copy to tests/e2e_real_canisters/wasms.local.toml or point
# IO_REAL_SNS_WASM_MANIFEST at a local checked manifest.
#
# `*_source_sha256` is the SHA-256 of the downloaded source artifact, usually
# a .wasm.gz file from https://download.dfinity.systems. `*_sha256` is the
# SHA-256 of the uncompressed .wasm bytes that PocketIC installs. The fetch
# script can fill `*_sha256` after verifying the pinned compressed source.

