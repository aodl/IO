# Initial icp-cli configuration. This is intentionally skeletal and mirrors the
# Jupiter Faucet convention of using icp-cli rather than dfx.
canisters:
  - name: io_nns_neuron_manager
    build:
      steps:
        - type: pre-built
          path: release-artifacts/io_nns_neuron_manager.wasm.gz
  - name: io_stream_manager
    build:
      steps:
        - type: pre-built
          path: release-artifacts/io_stream_manager.wasm.gz
  - name: io_historian
    build:
      steps:
        - type: pre-built
          path: release-artifacts/io_historian.wasm.gz
  - name: frontend
    build:
      steps:
        - type: pre-built
          path: release-artifacts/io_frontend.wasm.gz

environments:
  - name: local
    network: local
  - name: mainnet
    network: ic
